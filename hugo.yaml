baseURL: https://www.intelliumx.com
languageCode: en-us
title: IntelliumX

module:
  # uncomment line below for local development of module
  # workspace: hugo.work
  imports:
    path: github.com/StefMa/hugo-fresh

googleAnalytics: null
  # Put in your tracking code without quotes like this: UA-XXX for universal tracking or G-XXX analytics v4 tracking
  # Disables warnings

disableKinds: []
markup:
  goldmark:
    renderer:
      unsafe: true # Allows you to write raw html in your md files

params:
  openGraph: true
  description: IntelliumX builds practical cloud and AI solutions that simplify
    everyday work and life through secure, easy-to-use, and cost-effective software.
  preloader: false
  font:
    name: Open Sans
    sizes:
      - 400
      - 600
  navbar:
    - title: Home
      url: /
    - title: Products
      url: /#products
    - title: Knowledge
      url: /#knowledge
    - title: About
      url: /#about
    - title: Blog
      url: /posts/
    - title: Launch RefynePro
      url: https://refynepro.intelliumx.com/editor
      button: true
      target: _blank
  hero:
    tagline: Simple Technology. Real Solutions.
    vision: To make modern technology effortless, so people can focus on what matters most.
    primaryButton:
      text: Explore Products
      link: /#products
    secondaryButton:
      text: Knowledge Hub
      link: /#knowledge
  products:
    eyebrow: Products
    title: Our product
    subtitle: RefynePro is IntelliumX's AI-first knowledge workspace—built for real daily use.
    items:
      - name: RefynePro
        status: Available now
        icon: images/projects/refynepro/Logo.svg
        wordmark: images/projects/refynepro/logo-light-mode.svg
        brandTagline: Your personal AI knowledge base.
        description: Organise, improve, and reuse the knowledge you create with AI. Keep
          your ideas searchable, structured, and always within reach.
        url: https://refynepro.intelliumx.com/editor
        external: true
        launchText: Launch RefynePro
        helpUrl: /help/refynepro/
        helpText: Help & Tutorials
        image: images/projects/refynepro/refynepro-screenshot.jpg
  knowledgeHub:
    eyebrow: Knowledge Hub
    title: Learn. Build. Grow.
    subtitle: Practical guides, technical insights, and real-world solutions to help
      you get more from AI, cloud, and modern technology.
    recentCount: 5
    channels:
      - label: Articles
        title: Technical Blog
        text: Step-by-step guides on AWS, AI, DevOps, and software development—written
          from hands-on experience.
        url: /posts/
      - label: Video
        title: RefynePro on YouTube
        text: Product tutorials, walkthroughs, and tips for getting the most out of RefynePro.
        url: https://www.youtube.com/@RefynePro
        external: true
      - label: Insights
        title: Project Deep Dives
        text: Architecture notes, lessons learned, and behind-the-scenes looks at how
          our products are built.
        url: /projects/
  companyAbout:
    eyebrow: About IntelliumX
    titleLine1: Built from real-world engineering experience.
    titleLine2: Designed for real people.
    intro: |
      Modern technology offers incredible possibilities—but too often it's difficult to understand or more complicated than it needs to be.

      IntelliumX builds practical cloud and AI solutions that make powerful technology easier to use through simplicity, security, and thoughtful design.
    question: "Every product begins with one question: How can we make this easier for people?"
    pillars:
      - title: Practical Solutions
        text: Technology should solve real problems—not create new ones.
      - title: Simple by Design
        text: We remove unnecessary complexity so anyone can use our products with confidence.
      - title: Built on Trust
        text: Security, reliability, and continuous improvement are built into everything we create.
    closing: |
      Our products are inspired by decades of hands-on engineering experience across enterprise software, cloud infrastructure, automation, and AI.

      We combine proven engineering practices with modern technologies to build solutions that are practical today and ready for tomorrow.
    founder:
      title: Meet the Founder
      bio: IntelliumX was founded by Nobuhiro Tokushige, a software engineer with over 20 years of experience designing, supporting, and delivering enterprise software solutions. Drawing on expertise in cloud computing, AI, and automation, he founded IntelliumX to build practical technology that helps people solve real-world problems through simple, reliable, and secure software.
      links:
        - text: LinkedIn
          url: https://www.linkedin.com/in/nobuhiro-tokushige/
          external: true
  footer:
    logo: IntelliumX-v25.png
    bulmalogo: false
    quicklinks:
      column1:
        title: Company
        links:
          - text: Home
            link: /
          - text: Products
            link: /#products
          - text: About
            link: /#about
          - text: Blog
            link: /posts/
      column2:
        title: Resources
        links:
          - text: Knowledge Hub
            link: /posts/
          - text: RefynePro Help Center
            link: /help/refynepro/
          - text: Projects
            link: /projects/
          - text: Blog Archives
            link: /archives/
      column3:
        title: Product
        links:
          - text: Launch RefynePro
            link: https://refynepro.intelliumx.com/editor
            target: _blank
